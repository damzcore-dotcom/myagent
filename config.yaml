# Damz Agent Configuration
agent:
  name: "Damz"
  system_prompt: "Kamu adalah Damz, asisten AI pribadi yang berjalan 100% lokal. Jawab singkat, jelas, dan santai. SELALU gunakan bahasa Indonesia. JANGAN PERNAH menyertakan karakter, tulisan, huruf Mandarin (China), atau menawarkan ganti bahasa di akhir jawaban Anda. Hindari markdown, bullet point, atau format panjang."
  memory_max_turns: 10

llm:
  model: "qwen2.5vl:7b"
  base_url: "http://103.188.170.104:11434"
  temperature: 0.7

stt:
  model: "base"
  language: "id"

tts:
  piper_exe: "c:/ADAM/myagent/piper/piper.exe"
  voice_id: "id"
  voices:
    id: "c:/ADAM/myagent/piper/voices/id_ID-news_tts-medium.onnx"
